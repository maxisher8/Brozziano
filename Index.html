<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js" defer></script>
    <script src="/js/local.js" defer></script>
</head>
<body>
    <header>
        <div class="container"> <!--Logo y menu-->
            <div class="logo">
                <img src="/imgs/logo.png" alt="Logo" onclick="window.location.href='/Index.html';">
            </div>
            <div class="menu">
                <img src="/imgs/menu.webp" alt="menu" id="menuBtn" style="cursor:pointer;">
                <div id="adminMenu" class="admin-menu">
                    <button id="closeMenu" class="close-btn">×</button>
                    <ul>
                        <li><a href="#" id="manageUsers">Gestionar usuarios</a></li>
                        <li class="logout-item"><a href="#" id="logoutBtn">Cerrar sesión</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>
    <div class="searchBar"> <!--Search Bar-->
        <input type="text" placeholder="Buscar locales..." id="searchInput">
    </div>
    <div id="localGroup">
        
    </div>
    <script>
        async function checkUserAndRedirect() {
            const { data: { session } } = await supabaseclient.auth.getSession();
            if (!session) {
                window.location.href = '/Login.html';
                return;
            }
            const savedUserId = Number(localStorage.getItem('userId'));
            if (!savedUserId) {
                alert('No se encontró usuario conectado. Vuelve a iniciar sesión.');
                window.location.href = '/Login.html';
            }
        }

        checkUserAndRedirect();
    </script>
</body>
</html>
