<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoCat</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/config.js" defer></script>
    <script src="/js/info.js" defer></script>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <img src="/imgs/logo.png" alt="Logo" onclick="window.location.href='/Index.html';">
            </div>
            <div class="menu">
                <img src="/imgs/menu.webp" alt="menu">
            </div>
        </div>
    </header>

    <div class="page-header">
        <button onclick="history.back();" class="back-button">←</button>
        <h1 id="preguntaTitle">Categoria</h1>
    </div>

    <div class="info-content">
        <div class="info-row">
            <div class="textarea-row">
                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" placeholder="Escribe observaciones del local..." rows="10"></textarea>
            </div>
        </div>
    </div>

    <footer class="footer">
        <button id="saveCatBtn" class="save-btn">Guardar</button>
    </footer>

</body>
</html>
